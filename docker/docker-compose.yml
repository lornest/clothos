services:
  nats:
    image: nats:2.10
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - ./nats-server.conf:/etc/nats/nats-server.conf
      - nats-data:/data
    command: ["-c", "/etc/nats/nats-server.conf"]

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── ClothOS nodes ────────────────────────────────────────
  # Mount your node config (with secrets) at /app/config/node.json5
  # Pass API keys via environment variables.
  #
  # Usage:
  #   docker-compose up nats redis node-a
  #   docker-compose --profile sandbox up    # include sandbox service

  node-a:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    volumes:
      - ../config/node-a.json5:/app/config/node.json5:ro
      - node-a-data:/data
      - node-a-workspace:/workspace
    ports:
      - "3000:3000"
    env_file:
      - ../config/.env.node-a
    environment:
      - CLOTHOS_PROVIDER=${CLOTHOS_PROVIDER:-openai-completions}
      - CLOTHOS_MODEL=${CLOTHOS_MODEL:-gpt-4.1}
      - CLOTHOS_AUTH_MODE=${CLOTHOS_AUTH_MODE:-apikey}
    depends_on:
      nats:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  node-b:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    volumes:
      - ../config/node-b.json5:/app/config/node.json5:ro
      - node-b-data:/data
      - node-b-workspace:/workspace
    ports:
      - "3001:3000"
    env_file:
      - ../config/.env.node-b
    environment:
      - CLOTHOS_PROVIDER=${CLOTHOS_PROVIDER:-openai-completions}
      - CLOTHOS_MODEL=${CLOTHOS_MODEL:-gpt-4.1}
      - CLOTHOS_AUTH_MODE=${CLOTHOS_AUTH_MODE:-apikey}
    depends_on:
      nats:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  sandbox:
    build:
      context: ..
      dockerfile: docker/Dockerfile.sandbox
    image: clothos-sandbox:latest
    profiles:
      - sandbox

volumes:
  nats-data:
  redis-data:
  node-a-data:
  node-a-workspace:
  node-b-data:
  node-b-workspace:
